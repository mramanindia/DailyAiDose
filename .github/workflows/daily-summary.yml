name: DailyAIdose Digest

on:
  schedule:
    # GitHub scheduled workflows use UTC and historically start 1-2.5h late.
    # Dispatch early at 01:30 UTC: the job generates the digest, then holds
    # posting until 03:30 UTC = 09:00 IST so it lands in ClickUp at 9 AM.
    - cron: '30 1 * * *'
    # Backup in case GitHub drops the early run entirely. The check job
    # skips it when today's digest already completed.
    - cron: '30 4 * * *'
  workflow_dispatch:      # Allow manual trigger

# Never let two digest runs overlap (e.g. a delayed primary + the backup).
concurrency:
  group: dailyaidose-digest
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Skip if today's digest already completed
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && \
             git log --oneline --since=midnight --grep="record seen items for $(date -u +%F)" | grep -q .; then
            echo "Digest already completed today — skipping this run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  daily-summary:
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to publish the summary archive to gh-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run DailyAIdose
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours 24

      - name: Hold until 09:00 IST (03:30 UTC) before posting
        if: github.event_name == 'schedule'
        run: |
          target=$(date -u -d 'today 03:30' +%s)
          now=$(date -u +%s)
          if [ "$now" -lt "$target" ]; then
            echo "Digest ready — holding $(( (target - now) / 60 )) min until 03:30 UTC."
            sleep $(( target - now ))
          else
            echo "Already past 03:30 UTC — posting immediately."
          fi

      - name: Post digest to ClickUp chat
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          # Workspace/channel ids are not secrets: Unloq workspace,
          # "knowledge sharing - learning" channel.
          CLICKUP_WORKSPACE_ID: "90151879889"
          CLICKUP_CHANNEL_ID: "2kyqh16h-15335"
        run: uv run python scripts/post_clickup_chat.py

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Persist seen-items state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: record seen items for ${{ env.DATE }}"
            git push origin HEAD:main
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
