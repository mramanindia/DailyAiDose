name: DailyAIdose Digest

on:
  schedule:
    # GitHub scheduled workflows use UTC. 03:30 UTC = 09:00 IST, so the
    # digest lands in ClickUp at 9 AM (runs may start up to ~30 min late).
    - cron: '30 3 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to publish the summary archive to gh-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run DailyAIdose
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours 24

      - name: Post digest to ClickUp chat
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          # Workspace/channel ids are not secrets: Unloq workspace,
          # "knowledge sharing - learning" channel.
          CLICKUP_WORKSPACE_ID: "90151879889"
          CLICKUP_CHANNEL_ID: "2kyqh16h-15335"
        run: uv run python scripts/post_clickup_chat.py

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Persist seen-items state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: record seen items for ${{ env.DATE }}"
            git push origin HEAD:main
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
